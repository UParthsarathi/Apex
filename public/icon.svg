<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Pure Black Background -->
  <rect width="512" height="512" fill="#000000" />
  
  <!-- Outer Glow for the A -->
  <g filter="url(#glow)">
    <!-- Main Mountain/A Shape -->
    <path d="M 256 76 L 460 435 L 384 435 L 256 204 L 128 435 L 52 435 Z" fill="#00FF88" />
    <!-- Crossbar of the A -->
    <path d="M 180 332 L 332 332 L 307 384 L 205 384 Z" fill="#00FF88" />
  </g>

  <!-- Filter Definitions -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>
